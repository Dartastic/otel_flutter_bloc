name: otel_flutter_bloc
description: Flutter overlay for `otel_bloc`. Re-exports the
  core observer + semantics and pulls in `flutter_bloc` so Flutter
  apps add one dependency to get OTel coverage of every Bloc / Cubit.
version: 0.1.0-beta.1
repository: https://github.com/dartastic/otel_flutter_bloc
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  otel_bloc: ^0.1.0-beta.1
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0

dev_dependencies:
  pubspec_parse: ^1.5.0
  pub_semver: ^2.0.0
  dart_flutter_team_lints: ^3.5.2
  flutter_test:
    sdk: flutter

dependency_overrides:
  # Use the local sibling while we iterate on both packages.
  otel_bloc:
    path: ../otel_bloc
